<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Projetos -Redes de Média Tensão</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="cabecalho">
  <div class="cabecalho-conteudo">
    <img src="../assets/img/logo.png" alt="Logo" class="logo-header">
    <h1 class="titulo-header">Projetos de Rede de Média Tensão</h1>
    <a href="../index.html" class="btn-voltar-home">
    <i class="fas fa-arrow-left"></i>
    Voltar ao Início
    </a>
  </div>
</header>

<!-- Botão WhatsApp -->
<a href="https://wa.me/5583986422752" class="whatsapp-float" target="_blank">
  <img src="../assets/img/whatsapp-icon.png" alt="WhatsApp">
</a>


<!-- ========================= -->
<!-- CARROSSEL 1 -->
<!-- ========================= -->

<div class="container">

  <div class="carousel-wrapper">

    <button class="scroll-btn left" onclick="scrollCarousel('carousel-sub1', -1)">❮</button>

    <div class="grid-projetos" id="carousel-sub1">

      <!-- CARD -->
      <div class="card-projeto">
        <div class="galeria-projeto">
          <img id="img-principal-01"
                class="img-principal-01"
                src="../assets/img/Projetos_SPDA/Projeto01/Vista 3D 1.jpg"
                loading="lazy">

                <div class="miniaturas">
                  <img src="../assets/img/Projetos_SPDA/Projeto01/Vista 3D 1.jpg"
                      onclick="trocarImagem(this,'img-principal-01')">
                  <img src="../assets/img/Projetos_SPDA/Projeto01/Vista 3D 2.jpg"
                      onclick="trocarImagem(this,'img-principal-01')">
                  <img src="../assets/img/Projetos_SPDA/Projeto01/Vista 3D 3.jpg"
                      onclick="trocarImagem(this,'img-principal-01')">
                  <img src="../assets/img/Projetos_SPDA/Projeto01/Vista 3D 4.jpg"
                      onclick="trocarImagem(this,'img-principal-01')">
                </div>
          </div>
      </div>
    </div>

    <button class="scroll-btn right" onclick="scrollCarousel('carousel-sub1', 1)">❯</button>

  </div>

</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->

<script>

function scrollCarousel(containerId, direction) {

  const container = document.getElementById(containerId);

  if(!container) return;

  const card = container.querySelector('.card-projeto');

  const cardWidth = card.offsetWidth + 10;

  container.scrollBy({
    left: direction * cardWidth,
    behavior: 'smooth'
  });

}

function trocarImagem(elemento,idImagem){

  const imagemPrincipal = document.getElementById(idImagem);

  imagemPrincipal.src = elemento.src;

}

</script>

</body>
</html>
