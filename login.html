<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | Plataforma VK Energia</title>

  <link rel="icon" href="assets/img/logo-vsk.png" sizes="32x32">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style_index.css">
  <link rel="stylesheet" href="style-area-cliente.css">
  <link rel="stylesheet" href="login.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="body-login">

  <main class="login-vk">

    <div class="login-card">

      <div class="login-logo">
        <img src="assets/img/logo branca sem fundo.png" alt="VK Engenharia">
      </div>

      <span class="section-tag">Área do Cliente</span>

      <h1>VK Energia</h1>

      <p>
        Acesse sua plataforma de gestão energética, análise tarifária
        e acompanhamento técnico das faturas de energia.
      </p>

      <form class="form-login" action="http://localhost:8501">

        <div class="campo-login">
          <label for="email">E-mail</label>
          <div>
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="seuemail@empresa.com.br">
          </div>
        </div>

        <div class="campo-login">
          <label for="senha">Senha</label>
          <div>
            <i class="fas fa-lock"></i>
            <input type="password" id="senha" placeholder="Digite sua senha">
          </div>
        </div>

        <div class="login-opcoes">
          <label>
            <input type="checkbox">
            Lembrar acesso
          </label>

          <a href="#">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-login">
          Entrar na Plataforma
        </button>

      </form>

      <div class="login-links">
        <a href="vk-energia.html">
          <i class="fas fa-arrow-left"></i>
          Voltar para VK Energia
        </a>

        <a href="https://wa.me/5583986422752?text=Olá%20Victor,%20gostaria%20de%20solicitar%20acesso%20ao%20VK%20Energia" target="_blank">
          Solicitar acesso
        </a>
      </div>

    </div>

  </main>

</body>
</html>
